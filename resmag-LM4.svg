<svg xmlns="http://www.w3.org/2000/svg" width="240" height="60" viewBox="0 0 240 60">
  <defs>
    <linearGradient id="gradLM4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00b4db"/>
      <stop offset="100%" stop-color="#0b3642"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Insignia Circular -->
  <g transform="translate(35, 30)">
    <circle cx="0" cy="0" r="28" fill="url(#gradLM4)" filter="url(#shadow)"/>
    <!-- Anillo decorativo -->
    <circle cx="0" cy="0" r="25" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.6"/>
    <!-- Meridianos sutiles -->
    <path d="M0,-28 V28 M-15,-23 Q-25,0 -15,23 M15,-23 Q25,0 15,23 M-28,0 H28" stroke="#ffffff" stroke-width="0.5" opacity="0.2" fill="none"/>
    <!-- Texto Monograma -->
    <text x="0" y="5" fill="#ffffff" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="16" font-weight="900" text-anchor="middle">RSMG</text>
  </g>

  <!-- Texto Principal -->
  <text x="145" y="42" fill="#ffffff" font-family="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif" font-size="36" font-weight="800" text-anchor="middle" letter-spacing="1" filter="url(#shadow)">RESMAG</text>
</svg>