<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RESMAG – Registro</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-wrapper{max-width:480px;margin:80px auto;padding:30px;background:#1b2028;border:1px solid rgba(255,255,255,0.06);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.35)}
    .auth-wrapper h1{margin:0 0 14px;color:#fff;font-size:1.6rem}
    .auth-wrapper p{margin:0 0 20px;color:#c0c5ce}
    .auth-wrapper input{width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:#141820;color:#fff;margin-bottom:14px}
    .auth-actions{display:flex;gap:12px;align-items:center;justify-content:space-between}
    .auth-wrapper button{flex:1;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,#00b4db,#0083b0);color:#fff;font-weight:700;cursor:pointer}
    .auth-wrapper a{color:#00b4db;text-decoration:none}
    .auth-note{margin:0 auto 18px;padding:12px 14px;border-radius:10px;background:rgba(0,132,180,0.12);border:1px solid rgba(0,132,180,0.35);color:#d9f2ff;display:none}
  </style>
  </head>
<body class="transparent-header-page">
  <div class="barra-superior">
    <img src="images/LM1.png" alt="RESMAG REPAIRS SERVICES MAINTENANCE GROUP SAC" />
    <nav class="menu">
      <a href="index.html" data-es="Inicio" data-en="Home" data-pt="Início">Inicio</a>
      <a href="nosotros.html" data-es="Nosotros" data-en="About Us" data-pt="Sobre Nós">Nosotros</a>
      <a href="servicios.html" data-es="Servicios" data-en="Services" data-pt="Serviços">Servicios</a>
      <a href="contactanos.html" data-es="Contáctanos" data-en="Contact" data-pt="Contate-nos">Contáctanos</a>
      <select id="selector-idioma">
        <option value="es">🇪🇸 ES</option>
        <option value="en">🇺🇸 US</option>
        <option value="pt">🇧🇷 BR</option>
      </select>
      <span class="spacer"></span>
      <a href="login.html" class="login-btn" data-es="Ingresar" data-en="Login" data-pt="Entrar">Ingresar</a>
    </nav>
  </div>

  <div class="auth-wrapper">
    <div id="regNotice" class="auth-note">Regístrate para hacer una cotización</div>
    <h1 data-es="Crear nueva cuenta" data-en="Create a new account" data-pt="Criar nova conta">Crear nueva cuenta</h1>
    <p data-es="Completa tus datos para registrarte." data-en="Fill in your details to sign up." data-pt="Preencha seus dados para se cadastrar.">Completa tus datos para registrarte.</p>
    <form action="http://localhost/res-log-man/register.php" method="POST">
      <input type="hidden" name="next" id="nextField" value="index.html">
      <input type="text" name="full_name" placeholder="Nombre completo"
             data-es-placeholder="Nombre completo"
             data-en-placeholder="Full name"
             data-pt-placeholder="Nome completo" required>
      <input type="email" name="email" placeholder="Correo electrónico"
             data-es-placeholder="Correo electrónico"
             data-en-placeholder="Email"
             data-pt-placeholder="E-mail" required>
      <input type="password" name="password" placeholder="Contraseña"
             data-es-placeholder="Contraseña"
             data-en-placeholder="Password"
             data-pt-placeholder="Senha" required>
      <div class="auth-actions">
        <button type="submit" data-es="Registrarme" data-en="Sign up" data-pt="Cadastrar">Registrarme</button>
        <a href="login.html" data-es="Ya tengo cuenta" data-en="I have an account" data-pt="Já tenho conta">Ya tengo cuenta</a>
      </div>
    </form>
  </div>

  <script>
    const selector = document.getElementById("selector-idioma");
    selector.addEventListener("change", () => {
      const idioma = selector.value;
      document.querySelectorAll("[data-es]").forEach(el => { el.textContent = el.dataset[idioma]; });
      document.querySelectorAll("[data-es-placeholder]").forEach(el => { el.placeholder = el.dataset[idioma + "-placeholder"];});
    });
    (function setNext() {
      const params = new URLSearchParams(location.search);
      const next = params.get('next');
      if (next) document.getElementById('nextField').value = next;
    })();
    (function showNotice(){
      const params = new URLSearchParams(location.search);
      if (params.get('motivo') === 'registrate-cotizacion') {
        const n = document.getElementById('regNotice');
        if (n) n.style.display = 'block';
      }
    })();
  </script>
</body>
</html>
