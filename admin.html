<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Panel de Administración – RESMAG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="transparent-header-page">

  <div class="barra-superior">
    <img src="images/LM1.png" alt="RESMAG REPAIRS SERVICES MAINTENANCE GROUP SAC" />
    <nav class="menu">
      <a href="index.html" data-es="Inicio" data-en="Home" data-pt="Início">Inicio</a>
      <a href="servicios.html" data-es="Servicios" data-en="Services" data-pt="Serviços">Servicios</a>
      <a href="cotizacion.html" data-es="Cotización" data-en="Quote" data-pt="Orçamento">Cotización</a>
      <select id="selector-idioma">
        <option value="es">🇪🇸 ES</option>
        <option value="en">🇺🇸 US</option>
        <option value="pt">🇧🇷 BR</option>
      </select>
      <span class="spacer"></span>
      <a href="login.html" class="login-btn" data-es="Ingresar" data-en="Login" data-pt="Entrar">Ingresar</a>
    </nav>
  </div>

  <script>
    (function sessionNav(){
      const menu = document.querySelector('.menu');
      const loginBtn = document.querySelector('.login-btn');
      if (!menu || !loginBtn) return;
      function renderUser(email){
        const raw = (email || '').split('@')[0] || 'Cuenta';
        const pretty = raw.charAt(0).toUpperCase() + raw.slice(1);
        loginBtn.style.display = 'none';
        let userChip = document.querySelector('.user-chip');
        if (!userChip) {
          userChip = document.createElement('span');
          userChip.className = 'user-chip';
          loginBtn.insertAdjacentElement('afterend', userChip);
        }
        userChip.textContent = pretty;
        let logoutLink = document.querySelector('.logout-btn');
        if (!logoutLink) {
          logoutLink = document.createElement('a');
          logoutLink.className = 'logout-btn';
          logoutLink.href = 'http://localhost/res-log-man/logout.php';
          logoutLink.textContent = 'Cerrar Sesión';
          logoutLink.addEventListener('click', function(){
            try { sessionStorage.removeItem('resmag_email'); } catch(e){}
            try { localStorage.removeItem('resmag_email'); } catch(e){}
          });
          userChip.insertAdjacentElement('afterend', logoutLink);
        }
      }
      function fetchSession(){
        return fetch('/res-log-man/api/session.php', { credentials: 'include' })
          .then(r => r.ok ? r.json() : null)
          .catch(() => null)
          .then(s => {
            if (s) return s;
            return fetch('http://localhost/res-log-man/api/session.php', { credentials: 'include' })
              .then(r => r.ok ? r.json() : null)
              .catch(() => null);
          });
      }
      fetchSession()
        .then(s => {
          const mail = (s && (s.email || s.correo || s.mail || (s.user && (s.user.email || s.user.correo))
                              || (s.usuario && (s.usuario.email || s.usuario.correo))
                              || (s.cliente && (s.cliente.email || s.cliente.correo))
                              || (s.account && (s.account.email || s.account.correo)))) || '';
          const isLogged = !!(s && (s.logged === true || s.ok === true || s.status === 'ok' || s.success === true || mail));
          if (isLogged) {
            renderUser(mail);
          }
        })
        .catch(()=>{});
    })();
  </script>

  <div id="adminApp" style="display:none">
    <div class="contenido">
      <h2 data-es="Panel de Administración" data-en="Admin Panel" data-pt="Painel de Administração">Panel de Administración</h2>
      <div class="admin-header-actions">
        <div class="admin-search">
          <input id="searchInput" type="text" placeholder="Buscar por nombre, empresa, correo o servicio">
        </div>
        <button id="refreshBtn">Actualizar</button>
      </div>
    </div>

    <div class="contenido">
      <div class="admin-cards">
        <section class="admin-card">
          <h3 data-es="Solicitudes de Cotización" data-en="Quote Requests" data-pt="Solicitações de Orçamento">Solicitudes de Cotización</h3>
          <div class="admin-table-wrapper">
            <table class="admin-table" id="quotesTable">
              <thead>
                <tr>
                  <th data-es="Fecha" data-en="Date" data-pt="Data">Fecha</th>
                  <th data-es="Nombre" data-en="Name" data-pt="Nome">Nombre</th>
                  <th data-es="Empresa" data-en="Company" data-pt="Empresa">Empresa</th>
                  <th>Email</th>
                  <th data-es="Teléfono" data-en="Phone" data-pt="Telefone">Teléfono</th>
                  <th data-es="Servicio" data-en="Service" data-pt="Serviço">Servicio</th>
                  <th data-es="Mensaje" data-en="Message" data-pt="Mensagem">Mensaje</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
            <div class="admin-empty" id="quotesEmpty">Sin datos</div>
          </div>
        </section>

        <section class="admin-card">
          <h3 data-es="Mensajes de WhatsApp" data-en="WhatsApp Messages" data-pt="Mensagens de WhatsApp">Mensajes de WhatsApp</h3>
          <div class="admin-table-wrapper">
            <table class="admin-table" id="whatsappTable">
              <thead>
                <tr>
                  <th data-es="Fecha" data-en="Date" data-pt="Data">Fecha</th>
                  <th data-es="Nombre" data-en="Name" data-pt="Nome">Nombre</th>
                  <th data-es="Teléfono" data-en="Phone" data-pt="Telefone">Teléfono</th>
                  <th data-es="Mensaje" data-en="Message" data-pt="Mensagem">Mensaje</th>
                  <th data-es="Enlace" data-en="Link" data-pt="Link">Enlace</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
            <div class="admin-empty" id="whatsappEmpty">Sin datos</div>
          </div>
        </section>
      </div>
    </div>
  </div>

  <script>
    const API_QUOTES = 'http://localhost/res-log-man/api/quotes.php';
    const API_WSP = 'http://localhost/res-log-man/api/whatsapp.php';

    const quotesTbody = document.querySelector('#quotesTable tbody');
    const wspTbody = document.querySelector('#whatsappTable tbody');
    const quotesEmpty = document.getElementById('quotesEmpty');
    const whatsappEmpty = document.getElementById('whatsappEmpty');
    const searchInput = document.getElementById('searchInput');
    const refreshBtn = document.getElementById('refreshBtn');

    let quotesData = [];
    let wspData = [];

    async function fetchJSON(url) {
      try {
        const res = await fetch(url, { credentials: 'include' });
        if (res.status === 401) {
          const params = new URLSearchParams({ motivo: 'sin-permiso', next: 'admin.html' });
          window.location.href = 'login.html?' + params.toString();
          return [];
        }
        if (!res.ok) return [];
        return await res.json();
      } catch {
        return [];
      }
    }

    function norm(s){ return (s ?? '').toString().toLowerCase(); }

    function renderQuotes(rows) {
      quotesTbody.innerHTML = '';
      if (!rows.length) { quotesEmpty.style.display = 'block'; return; }
      quotesEmpty.style.display = 'none';
      rows.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${r.fecha || r.created_at || ''}</td>
          <td>${r.nombre || r.full_name || ''}</td>
          <td>${r.empresa || ''}</td>
          <td>${r.email || ''}</td>
          <td>${r.telefono || r.phone || ''}</td>
          <td>${r.servicio || r.service || ''}</td>
          <td>${r.mensaje || r.message || ''}</td>
        `;
        quotesTbody.appendChild(tr);
      });
    }

    function renderWsp(rows) {
      wspTbody.innerHTML = '';
      if (!rows.length) { whatsappEmpty.style.display = 'block'; return; }
      whatsappEmpty.style.display = 'none';
      rows.forEach(r => {
        const tr = document.createElement('tr');
        const enlace = r.enlace || r.link || (r.telefono ? `https://wa.me/${r.telefono}` : '');
        tr.innerHTML = `
          <td>${r.fecha || r.created_at || ''}</td>
          <td>${r.nombre || ''}</td>
          <td>${r.telefono || ''}</td>
          <td>${r.mensaje || r.message || ''}</td>
          <td>${enlace ? `<a href="${enlace}" target="_blank">Abrir</a>` : ''}</td>
        `;
        wspTbody.appendChild(tr);
      });
    }

    function applyFilter() {
      const q = norm(searchInput.value);
      const f1 = quotesData.filter(r =>
        norm(r.nombre).includes(q) ||
        norm(r.empresa).includes(q) ||
        norm(r.email).includes(q) ||
        norm(r.servicio).includes(q) ||
        norm(r.mensaje).includes(q)
      );
      const f2 = wspData.filter(r =>
        norm(r.nombre).includes(q) ||
        norm(r.telefono).includes(q) ||
        norm(r.mensaje).includes(q)
      );
      renderQuotes(f1);
      renderWsp(f2);
    }

    async function checkAdmin() {
      try {
        const res = await fetch(API_QUOTES, { credentials: 'include' });
        if (res.status === 401) {
          const params = new URLSearchParams({ motivo: 'sin-permiso', next: 'admin.html' });
          window.location.href = 'login.html?' + params.toString();
          return false;
        }
        return true;
      } catch {
        return false;
      }
    }

    async function loadData() {
      quotesData = await fetchJSON(API_QUOTES);
      wspData = await fetchJSON(API_WSP);
      renderQuotes(quotesData);
      renderWsp(wspData);
    }

    searchInput.addEventListener('input', applyFilter);
    refreshBtn.addEventListener('click', loadData);
    document.addEventListener('DOMContentLoaded', async () => {
      const ok = await checkAdmin();
      if (ok) {
        document.getElementById('adminApp').style.display = '';
        loadData();
      }
    });
  </script>
</body>
</html>
